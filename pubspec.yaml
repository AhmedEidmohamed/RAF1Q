name: socialsteps_app
description: A therapeutic educational app for children with social and communication difficulties

# Prevent accidental publishing to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2                 # Internationalization
  
  # State Management & DI
  provider: ^6.1.0              # State management
  get_it: ^7.6.0                # Service locator / DI
  shared_preferences: ^2.2.2    # Key-value storage
  fl_chart: ^0.63.0             # Charts for data visualization
  
  # Image & Media
  image_picker: ^1.0.7          # Image picker for profile photos
  camera: ^0.10.5                # Camera functionality
  tflite_flutter: ^0.10.4        # TensorFlow Lite for face recognition
  image: ^4.1.3                  # Image processing
  
  # Utilities
  json_annotation: ^4.8.1       # JSON serialization
  equatable: ^2.0.5             # Value equality
  http: ^1.6.0                  # HTTP requests
  
  # Google Sign-In
  google_sign_in: ^6.2.1        # Google authentication
  
  # Voice functionality
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  audioplayers: ^6.6.0
  just_audio: ^0.10.5
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  universal_html: ^2.2.4
  record_mp3_plus: ^1.5.0

  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_app_check: ^0.3.2+10
  
  # AI
  google_generative_ai: ^0.4.0
  
  # Animations
  animations: ^2.1.1
  video_player: ^2.11.1
  chewie: ^1.13.1
  google_nav_bar: ^5.0.7
  google_fonts: ^8.1.0
  lottie: ^3.3.3
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^2.0.0
  
  # Code generation
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  
  # Splash screen
  flutter_native_splash: ^2.4.5

# Assets
# Uncomment when you add local assets
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/vedio/
    - assets/animals/
    - assets/food/
    - assets/fruits/
    - assets/home_tools/
    - assets/vegetables/
    - assets/signs/
    - .env

  # Example:
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  
  android: true
  android_12:
    image: assets/images/splash.png
    icon_background_color: "#FFFFFF"
  
  ios: true
  web: false
